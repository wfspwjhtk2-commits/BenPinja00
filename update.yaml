name: Quant Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: '18' }
      - run: npm install playwright
      - run: npx playwright install chromium
      - run: node scraper.js
      - name: Push Data
        run: |
          git config user.name "QuantBot"
          git config user.email "bot@quant.com"
          git add market_data.json
          git commit -m "Live Data Update" || exit 0
          git push
